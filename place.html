<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Information about Peru, including weather and general data.">
    <meta name="author" content="Yeikob Valverde">

    <title>Peru</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

<header>
    <h1>Peru</h1>
</header>

<main>

    <picture class="hero">
        <source srcset="images/peru-large.webp" media="(min-width: 768px)">
        <img src="images/peru-small.webp" alt="Machu Picchu in Peru">
    </picture>

    <section class="data">
        <h2>Data</h2>

        <p><strong>Capital:</strong> Lima</p>
        <p><strong>Population:</strong> 34.5 Million</p>
        <p><strong>Area:</strong> 1,285,216 km²</p>
        <p><strong>Languages:</strong> Spanish, Quechua, Aymara</p>
        <p><strong>Currency:</strong> Peruvian Sol (PEN)</p>
        <p><strong>Time Zone:</strong> UTC -5</p>
    </section>

    <section class="weather">
        <h2>Weather</h2>

        <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

        <p><strong>Temperature:</strong> <span id="temperature">8</span> °C</p>
        <p><strong>Conditions:</strong> Partly Cloudy</p>
        <p><strong>Wind:</strong> <span id="wind">12</span> km/h</p>
        <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>
    </section>

</main>

<footer>
    <p>&copy; <span id="currentYear"></span> Yeikob Valverde | Peru</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
